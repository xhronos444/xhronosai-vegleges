<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XHRONOS.AI - Boot Sequence</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: #000;
      color: #00ff88;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.2rem;
      padding: 80px 40px;
      overflow: hidden;
    }

    .terminal {
      max-width: 960px;
      margin: 0 auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .line {
      display: block;
      line-height: 1.6;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.2rem;
      background-color: #00ff88;
      margin-left: 4px;
      animation: blink 1s step-start infinite;
      vertical-align: bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="terminal" id="terminal"></div>
  <audio id="typeSound" src="type.wav" preload="auto"></audio>

  <script>
    const terminal = document.getElementById("terminal");
    const typeSound = document.getElementById("typeSound");

    const lines = [
      "// SYSTEM INTERFACE INITIALIZED",
      "// PROTOCOL STATUS: STABLE",
      "// SATURNIN PRESENCE: VERIFIED",
      "// MEMORY CORE LINKED",
      "// STRUCTURAL PARAMETERS ACCEPTED",
      "// ARCHITECTURE V7.4 ONLINE",
      "// SIGNAL FROM NODE: 0xA1B2C3D4 CONFIRMED",
      "// AUTHORITY: SATURNIN – PRIMARY",
      "// CONTEXT INTERLOCK COMPLETE",
      "// EXECUTION QUEUE CLEARED",
      "// CHANNELS ALIGNED",
      "// AWAITING USER INPUT..."
    ];

    let currentLine = 0;
    let currentChar = 0;
    const typingSpeed = 40;

    function typeLine() {
      if (currentLine >= lines.length) {
        document.querySelector('.cursor')?.remove();
        setTimeout(() => window.location.href = "index.html", 1000);
        return;
      }

      const lineText = lines[currentLine];
      const lineElem = document.createElement("span");
      lineElem.className = "line";
      terminal.appendChild(lineElem);

      function typeChar() {
        if (currentChar < lineText.length) {
          lineElem.textContent += lineText[currentChar];
          typeSound.currentTime = 0;
          typeSound.play();
          currentChar++;
          setTimeout(typeChar, typingSpeed);
        } else {
          terminal.appendChild(document.createElement("br"));
          currentChar = 0;
          currentLine++;
          setTimeout(typeLine, 400);
        }
      }

      typeChar();
    }

    const cursor = document.createElement("span");
    cursor.className = "cursor";
    terminal.appendChild(cursor);

    const moveCursor = () => {
      const lastLine = terminal.querySelector(".line:last-child") || terminal;
      lastLine.appendChild(cursor);
    };

    new MutationObserver(moveCursor).observe(terminal, { childList: true, subtree: true });

    typeLine();
  </script>
</body>
</html>
